<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭资产管理系统 v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #0f172a;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger: #ef4444;
            --border-color: #e2e8f0;
            
            /* 资产颜色资产 */
            --color-fund: #3b82f6;
            --color-stock: #10b981;
            --color-cash: #f59e0b;
            --color-bond: #8b5cf6;
            --color-private: #ec4899;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 顶部大字报 */
        .header-panel {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            padding: 2.5rem;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.15);
            margin-bottom: 2rem;
            position: relative;
        }

        .header-panel h1 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .total-wealth {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        /* 历史记录操作区域 */
        .history-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: #475569; color: white; }
        .btn-secondary:hover { background: #334155; }

        .input-month {
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #334155;
            color: white;
            outline: none;
            font-weight: 500;
        }

        /* 布局网格升级：支持左侧输入，右侧双图表 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 992px) {
            .main-grid {
                grid-template-columns: 1fr 1.3fr;
            }
        }

        .right-charts {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        /* 卡片通用样式 */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .portfolio-tag {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-weight: 500;
        }

        .tag-family { background: #e0f2fe; color: #0369a1; }
        .tag-edu { background: #f3e8ff; color: #6b21a8; }

        /* 表单输入组 */
        .portfolio-section {
            margin-bottom: 2rem;
        }

        .portfolio-section:last-child {
            margin-bottom: 0;
        }

        .input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            background: #f8fafc;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .asset-label {
            display: flex;
            align-items: center;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .color-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .asset-input {
            width: 140px;
            border: none;
            background: transparent;
            text-align: right;
            padding: 0.5rem 0.5rem 0.5rem 1.5rem;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--primary);
            outline: none;
        }

        /* 图表容器 */
        .chart-container {
            position: relative;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .pie-size { max-width: 300px; }
        .line-size { height: 260px; width: 100%; }

        /* 隐藏原生数字箭头 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <h1>家庭净资产总额 / Total Wealth</h1>
        <div class="total-wealth" id="totalWealth">¥0.00</div>
        
        <div class="history-actions">
            <input type="month" id="recordMonth" class="input-month">
            <button class="btn btn-primary" onclick="saveToHistory()">记录当前快照</button>
            <button class="btn btn-secondary" style="background:#ef4444;" onclick="clearHistory()">清空历史趋势</button>
        </div>
    </div>

    <div class="main-grid">
        <div class="card">
            <h2 class="card-title">资产配置明细</h2>
            
            <div class="portfolio-section">
                <div class="card-title" style="font-size: 1.05rem; margin-bottom: 1rem;">
                    家庭主要资产 <span class="portfolio-tag tag-family">Portfolio A</span>
                </div>
                
                <div class="input-group">
                    <div class="asset-label">
                        <div class="color-indicator" style="background: var(--color-fund);"></div>基金
                    </div>
                    <div class="input-wrapper">
                        <span class="currency-symbol">¥</span>
                        <input type="number" class="asset-input" id="fund" value="0" step="0.01" oninput="updateAssets()">
                    </div>
                </div>

                <div class="input-group">
                    <div class="asset-label">
                        <div class="color-indicator" style="background: var(--color-stock);"></div>股票
                    </div>
                    <div class="input-wrapper">
                        <span class="currency-symbol">¥</span>
                        <input type="number" class="asset-input" id="stock" value="0" step="0.01" oninput="updateAssets()">
                    </div>
                </div>

                <div class="input-group">
                    <div class="asset-label">
                        <div class="color-indicator" style="background: var(--color-cash);"></div>现金存款
                    </div>
                    <div class="input-wrapper">
                        <span class="currency-symbol">¥</span>
                        <input type="number" class="asset-input" id="cash" value="0" step="0.01" oninput="updateAssets()">
                    </div>
                </div>
            </div>

            <div class="portfolio-section">
                <div class="card-title" style="font-size: 1.05rem; margin-bottom: 1rem;">
                    子女教育基金 <span class="portfolio-tag tag-edu">Portfolio B</span>
                </div>

                <div class="input-group">
                    <div class="asset-label">
                        <div class="color-indicator" style="background: var(--color-bond);"></div>债券
                    </div>
                    <div class="input-wrapper">
                        <span class="currency-symbol">¥</span>
                        <input type="number" class="asset-input" id="bond" value="0" step="0.01" oninput="updateAssets()">
                    </div>
                </div>

                <div class="input-group">
                    <div class="asset-label">
                        <div class="color-indicator" style="background: var(--color-private);"></div>私募基金
                    </div>
                    <div class="input-wrapper">
                        <span class="currency-symbol">¥</span>
                        <input type="number" class="asset-input" id="private" value="0" step="0.01" oninput="updateAssets()">
                    </div>
                </div>
            </div>
        </div>

        <div class="right-charts">
            <div class="card">
                <h2 class="card-title" style="margin-bottom: 1rem;">资产占比分析</h2>
                <div class="chart-container pie-size">
                    <canvas id="assetChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2 class="card-title" style="margin-bottom: 1rem;">历史资产走势（月度）</h2>
                <div class="chart-container line-size">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let pieChartInstance = null;
    let lineChartInstance = null;
    let historyData = []; // 存储结构: [{month: '2026-01', total: 10000}]

    // 页面初始化加载数据
    window.onload = function() {
        // 设置默认录入月份为当前系统月份
        const now = new Date();
        const currentMonthStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
        document.getElementById('recordMonth').value = currentMonthStr;

        // 恢复当前资产数据
        const savedData = localStorage.getItem('family_assets');
        if (savedData) {
            const data = JSON.parse(savedData);
            document.getElementById('fund').value = data.fund || 0;
            document.getElementById('stock').value = data.stock || 0;
            document.getElementById('cash').value = data.cash || 0;
            document.getElementById('bond').value = data.bond || 0;
            document.getElementById('private').value = data.private || 0;
        }

        // 恢复历史趋势数据
        const savedHistory = localStorage.getItem('family_assets_history');
        if (savedHistory) {
            historyData = JSON.parse(savedHistory);
            // 确保按时间先后排序
            historyData.sort((a, b) => new Date(a.month) - new Date(b.month));
        }

        // 初始化所有图表
        const { values, total } = calculateTotal();
        initPieChart(values);
        initLineChart();
    };

    // 获取当前所有输入值
    function getAssetValues() {
        return {
            fund: parseFloat(document.getElementById('fund').value) || 0,
            stock: parseFloat(document.getElementById('stock').value) || 0,
            cash: parseFloat(document.getElementById('cash').value) || 0,
            bond: parseFloat(document.getElementById('bond').value) || 0,
            private: parseFloat(document.getElementById('private').value) || 0
        };
    }

    // 计算总资产并更新顶层文本
    function calculateTotal() {
        const values = getAssetValues();
        const total = values.fund + values.stock + values.cash + values.bond + values.private;
        
        document.getElementById('totalWealth').innerText = '¥' + total.toLocaleString('zh-CN', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
        return { values, total };
    }

    // 实时更新资产数值
    function updateAssets() {
        const { values, total } = calculateTotal();
        localStorage.setItem('family_assets', JSON.stringify(values));

        const familyTotal = values.fund + values.stock + values.cash;
        const eduTotal = values.bond + values.private;

        if (pieChartInstance) {
            pieChartInstance.data.datasets[0].data = [values.fund, values.stock, values.cash, values.bond, values.private];
            pieChartInstance.data.datasets[1].data = [familyTotal, eduTotal];
            pieChartInstance.update();
        }
    }

    // 新增功能：将当前总资产记录到历史数据中
    function saveToHistory() {
        const monthInput = document.getElementById('recordMonth').value;
        if (!monthInput) {
            alert('请选择有效的月份！');
            return;
        }

        const { total } = calculateTotal();

        // 检查该月份是否已存在，存在则更新，不存在则追加
        const existingIndex = historyData.findIndex(item => item.month === monthInput);
        if (existingIndex >= 0) {
            historyData[existingIndex].total = total;
        } else {
            historyData.push({ month: monthInput, total: total });
        }

        // 重新按时间升序排序
        historyData.sort((a, b) => new Date(a.month) - new Date(b.month));

        // 存入本地存储并刷新折线图
        localStorage.setItem('family_assets_history', JSON.stringify(historyData));
        updateLineChart();
    }

    // 新增功能：清空所有历史数据
    function clearHistory() {
        if (confirm('确认清空所有历史资产趋势记录吗？该操作不可恢复。')) {
            historyData = [];
            localStorage.removeItem('family_assets_history');
            updateLineChart();
        }
    }

    // 新增功能：更新折线图视图数据
    function updateLineChart() {
        if (lineChartInstance) {
            const labels = historyData.map(item => item.month);
            const data = historyData.map(item => item.total);

            lineChartInstance.data.labels = labels;
            lineChartInstance.data.datasets[0].data = data;
            lineChartInstance.update();
        }
    }

    // 初始化占比环形图
    function initPieChart(values) {
        const ctx = document.getElementById('assetChart').getContext('2d');
        const familyTotal = values.fund + values.stock + values.cash;
        const eduTotal = values.bond + values.private;

        pieChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['基金', '股票', '现金存款', '债券', '私募基金'],
                datasets: [
                    {
                        data: [values.fund, values.stock, values.cash, values.bond, values.private],
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'],
                        borderWidth: 2,
                        weight: 2
                    },
                    {
                        data: [familyTotal, eduTotal],
                        backgroundColor: ['#1e293b', '#475569'],
                        borderWidth: 2,
                        weight: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            boxWidth: 10,
                            padding: 12,
                            font: { size: 11 },
                            filter: function(item, chartData) {
                                return chartData.labels.indexOf(item.text) > -1;
                            }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.chart.data.labels[context.dataIndex] || '';
                                if (context.datasetIndex === 1) {
                                    label = context.dataIndex === 0 ? '家庭主要资产总计' : '子女教育基金总计';
                                }
                                const val = context.raw;
                                const total = context.chart.data.datasets[context.datasetIndex].data.reduce((a, b) => a + b, 0);
                                const percentage = total > 0 ? ((val / total) * 100).toFixed(1) + '%' : '0%';
                                return ` ${label}: ¥${val.toLocaleString()} (${percentage})`;
                            }
                        }
                    }
                },
                cutout: '50%'
            }
        });
    }

    // 新增功能：初始化历史走势折线图
    function initLineChart() {
        const ctx = document.getElementById('trendChart').getContext('2d');
        const labels = historyData.map(item => item.month);
        const data = historyData.map(item => item.total);

        lineChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '总资产走势',
                    data: data,
                    borderColor: '#2563eb', // 灰蓝经典高亮
                    backgroundColor: 'rgba(37, 99, 235, 0.1)', // 渐变轻阴影
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3, // 让曲线更柔和流畅
                    pointBackgroundColor: '#2563eb',
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, // 允许拉伸铺满容器
                plugins: {
                    legend: { display: false }, // 无需多余的图例
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return ` 总资产: ¥${context.raw.toLocaleString('zh-CN', {minimumFractionDigits: 2})}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false }, // 隐藏竖向网格线线，让画面利落
                        ticks: { color: '#64748b', font: { size: 11 } }
                    },
                    y: {
                        grid: { color: '#e2e8f0' },
                        ticks: {
                            color: '#64748b',
                            font: { size: 11 },
                            // 简化 Y 轴过长数字的显示
                            callback: function(value) {
                                if (value >= 10000) {
                                    return (value / 10000) + ' 万';
                                }
                                return value;
                            }
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
