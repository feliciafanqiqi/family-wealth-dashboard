<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级家庭资产管理系统 v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #1e293b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --border-color: #e2e8f0;

            /* 资产大类标准配色 */
            --cls-fund: #3b82f6;       /* 基金 - 蓝色 */
            --cls-equity: #10b981;     /* 权益 - 绿色 */
            --cls-fixed: #8b5cf6;      /* 固定收益 - 紫色 */
            --cls-cash: #f59e0b;       /* 现金 - 橙色 */
            --cls-other: #64748b;      /* 其他 - 灰色 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem 1rem; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }

        /* 顶部看板 */
        .header-panel {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.15);
            margin-bottom: 2rem;
        }
        .header-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            text-align: center;
        }
        @media (min-width: 768px) {
            .header-grid { grid-template-columns: 1.5fr 1fr 1fr; text-align: left; }
            .kpi-box.right-align { text-align: right; }
        }
        .kpi-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #94a3b8; margin-bottom: 0.25rem; }
        .total-wealth { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; }
        .return-val { font-size: 1.75rem; font-weight: 600; margin-top: 0.25rem; }
        .text-up { color: #34d399; }
        .text-down { color: #f87171; }

        /* 核心布局 */
        .main-layout { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 1024px) { .main-layout { grid-template-columns: 1.2fr 1fr; } }

        /* 卡片级通用样式 */
        .card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); padding: 1.75rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); margin-bottom: 1.5rem; }
        .card:last-child { margin-bottom: 0; }
        .card-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }

        /* 按钮与输入控件 */
        .btn { padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: #fef2f2; color: var(--danger); }
        .btn-danger:hover { background: #fee2e2; }
        .btn-text-danger { background: transparent; color: var(--danger); padding: 0.25rem; font-size: 0.8rem; }
        .btn-text-danger:hover { text-decoration: underline; }
        
        .form-control { padding: 0.4rem 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; outline: none; font-size: 0.9rem; color: var(--primary); }
        .form-control:focus { border-color: var(--accent); }

        /* Portfolio 动态容器 */
        .portfolio-block { border: 1px solid var(--border-color); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; background: #fafafa; }
        .portfolio-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px dashed var(--border-color); padding-bottom: 0.5rem; }
        .portfolio-name-input { font-weight: 600; font-size: 1.05rem; border: none; background: transparent; color: var(--primary); width: 60%; }
        .portfolio-name-input:focus { background: #ffffff; border-bottom: 1px solid var(--accent); }

        /* 资产明细行 */
        .asset-row { display: grid; grid-template-columns: 1.2fr 1.2fr 1fr auto; gap: 0.75rem; align-items: center; margin-bottom: 0.75rem; }
        @media (max-width: 568px) { .asset-row { grid-template-columns: 1fr; gap: 0.4rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem; } }

        /* 历史曲线控制 */
        .history-bar { display: flex; flex-wrap: wrap; gap: 1rem; background: #f8fafc; padding: 1rem; border-radius: 12px; margin-top: 1rem; align-items: center; }

        /* 图表适配 */
        .chart-box { min-height: 280px; display: flex; justify-content: center; align-items: center; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel">
        <div class="header-grid">
            <div>
                <div class="kpi-label">家庭资产总净值 (Total Wealth)</div>
                <div class="total-wealth" id="txtTotalWealth">¥0.00</div>
            </div>
            <div>
                <div class="kpi-label">近1个月收益率 (1M Return)</div>
                <div class="return-val" id="txtReturn1M">--</div>
            </div>
            <div class="kpi-box right-align">
                <div class="kpi-label">近1年收益率 (1Y Return)</div>
                <div class="return-val" id="txtReturn1Y">--</div>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="left-column">
            <div class="card">
                <div class="card-title">
                    <span>核心资产架构配置</span>
                    <button class="btn btn-primary" onclick="addPortfolio()">＋ 新增 Portfolio</button>
                </div>
                
                <div id="portfolioContainer"></div>
            </div>

            <div class="card">
                <div class="card-title">历史资产快照存根</div>
                <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:0.5rem;">
                    请定期录入月末总资产数据，系统将依此全自动追踪计算过去1个月和1年的复合投资收益率。
                </p>
                <div class="history-bar">
                    <label style="font-size:0.9rem; font-weight:500;">选择月份:</label>
                    <input type="month" id="histMonth" class="form-control">
                    <label style="font-size:0.9rem; font-weight:500;">历史总资产 (¥):</label>
                    <input type="number" id="histValue" class="form-control" style="width:140px;" placeholder="金额">
                    <button class="btn btn-primary" onclick="saveHistoryRow()">记录快照</button>
                    <button class="btn btn-danger" onclick="clearAllHistory()">清空历史</button>
                </div>
            </div>
        </div>

        <div class="right-column">
            <div class="card">
                <div class="card-title">全资产类型分布 (按大类)</div>
                <div class="chart-box">
                    <canvas id="typeChart"></canvas>
                </div>
            </div>
            <div class="card">
                <div class="card-title">大类资产历史净值趋势</div>
                <div class="chart-box" style="height:300px;">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 核心底层数据结构定义
    let appState = {
        portfolios: [
            {
                id: "p_1",
                name: "家庭主要资产",
                assets: [
                    { name: "沪深300指数联接", type: "fund", value: 100000 },
                    { name: "腾讯控股", type: "equity", value: 50000 }
                ]
            },
            {
                id: "p_2",
                name: "子女教育基金",
                assets: [
                    { name: "东方30", type: "fund", value: 80000 },
                    { name: "国债2401", type: "fixed", value: 120000 }
                ]
            }
        ],
        history: [] // 格式：{ month: "2026-05", total: 320000 }
    };

    const typeMeta = {
        fixed: { label: "固定收益", color: "#8b5cf6" },
        equity: { label: "权益", color: "#10b981" },
        fund: { label: "基金", color: "#3b82f6" },
        cash: { label: "现金", color: "#f59e0b" },
        other: { label: "其他", color: "#64748b" }
    };

    let typeChartInstance = null;
    let trendChartInstance = null;

    window.onload = function() {
        // 设置快照默认月份
        const today = new Date();
        document.getElementById('histMonth').value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');

        // 读取本地存储
        const localData = localStorage.getItem('family_wealth_v3_state');
        if (localData) {
            try { appState = JSON.parse(localData); } catch(e) { console.error("解析历史缓存失败，转用默认集", e); }
        }

        renderEditor();
        calculateAndRefresh();
    };

    // 渲染配置视图层
    function renderEditor() {
        const container = document.getElementById('portfolioContainer');
        container.innerHTML = '';

        appState.portfolios.forEach((pf, pIndex) => {
            const block = document.createElement('div');
            block.className = 'portfolio-block';
            block.innerHTML = `
                <div class="portfolio-header">
                    <input type="text" class="portfolio-name-input" value="${pf.name}" onchange="changePfName(${pIndex}, this.value)" placeholder="未命名组合">
                    <button class="btn btn-text-danger" onclick="deletePortfolio(${pIndex})">✕ 移除组合</button>
                </div>
                <div id="asset_list_${pf.id}"></div>
                <div style="margin-top:0.8rem; text-align:right;">
                    <button class="btn btn-primary" style="padding:0.3rem 0.6rem; font-size:0.8rem;" onclick="addAssetRow(${pIndex})">＋ 添加资产项</button>
                </div>
            `;
            container.appendChild(block);

            const listDom = document.getElementById(`asset_list_${pf.id}`);
            pf.assets.forEach((ast, aIndex) => {
                const row = document.createElement('div');
                row.className = 'asset-row';

                let optionsHtml = '';
                for (let key in typeMeta) {
                    optionsHtml += `<option value="${key}" ${ast.type === key ? 'selected' : ''}>${typeMeta[key].label}</option>`;
                }

                row.innerHTML = `
                    <input type="text" class="form-control" value="${ast.name}" placeholder="资产别名（如:东方30）" onchange="changeAssetField(${pIndex}, ${aIndex}, 'name', this.value)">
                    <select class="form-control" onchange="changeAssetField(${pIndex}, ${aIndex}, 'type', this.value)">${optionsHtml}</select>
                    <input type="number" class="form-control" value="${ast.value}" placeholder="当前资产金额" step="0.01" oninput="changeAssetField(${pIndex}, ${aIndex}, 'value', this.value)">
                    <button class="btn btn-text-danger" onclick="deleteAssetRow(${pIndex}, ${aIndex})">移除</button>
                `;
                listDom.appendChild(row);
            });
        });
    }

    /* 状态写操作原子函数 */
    function addPortfolio() {
        appState.portfolios.push({ id: 'p_' + Date.now(), name: '自定义 Portfolio', assets: [] });
        saveAndSync();
    }
    function deletePortfolio(pIndex) {
        if(confirm(`确定删除该组合及内部所有资产项吗？`)) { appState.portfolios.splice(pIndex, 1); saveAndSync(); }
    }
    function changePfName(pIndex, val) { appState.portfolios[pIndex].name = val; saveAndSync(false); }
    function addAssetRow(pIndex) { appState.portfolios[pIndex].assets.push({ name: '', type: 'fund', value: 0 }); saveAndSync(); }
    function deleteAssetRow(pIndex, aIndex) { appState.portfolios[pIndex].assets.splice(aIndex, 1); saveAndSync(); }
    function changeAssetField(pIndex, aIndex, field, val) {
        if (field === 'value') {
            appState.portfolios[pIndex].assets[aIndex][field] = parseFloat(val) || 0;
            calculateAndRefresh(); // 金额变动无需全量重画DOM，仅刷新图表看板
            localStorage.setItem('family_wealth_v3_state', JSON.stringify(appState));
        } else {
            appState.portfolios[pIndex].assets[aIndex][field] = val;
            saveAndSync(false);
        }
    }

    function saveAndSync(redraw = true) {
        localStorage.setItem('family_wealth_v3_state', JSON.stringify(appState));
        if(redraw) renderEditor();
        calculateAndRefresh();
    }

    /* 数据计算及可视化桥接核心 */
    function calculateAndRefresh() {
        let currentTotal = 0;
        let typeDistribution = { fixed: 0, equity: 0, fund: 0, cash: 0, other: 0 };

        appState.portfolios.forEach(pf => {
            pf.assets.forEach(ast => {
                const v = parseFloat(ast.value) || 0;
                currentTotal += v;
                if (typeDistribution[ast.type] !== undefined) typeDistribution[ast.type] += v;
            });
        });

        document.getElementById('txtTotalWealth').innerText = '¥' + currentTotal.toLocaleString('zh-CN', { minimumFractionDigits: 2 });

        updateReturns(currentTotal);
        refreshPieChart(typeDistribution);
        refreshTrendChart();
    }

    /* 复合投资收益率计算层 */
    function updateReturns(currentTotal) {
        if (!appState.history || appState.history.length === 0) {
            document.getElementById('txtReturn1M').innerText = '--';
            document.getElementById('txtReturn1Y').innerText = '--';
            return;
        }

        const sortedHist = [...appState.history].sort((a,b) => new Date(a.month) - new Date(b.month));
        const today = new Date();

        // 辅助找回指定跨度基期总资产函数
        function getTargetTotal(monthsAgo) {
            const d = new Date(today.getFullYear(), today.getMonth() - monthsAgo, 1);
            const targetMonthStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
            const match = sortedHist.find(h => h.month === targetMonthStr);
            return match ? match.total : null;
        }

        const base1M = getTargetTotal(1);
        if (base1M && base1M > 0) {
            const r1M = ((currentTotal - base1M) / base1M) * 100;
            renderReturnTxt('txtReturn1M', r1M);
        } else { document.getElementById('txtReturn1M').innerText = '暂无基期'; document.getElementById('txtReturn1M').className='return-val'; }

        const base1Y = getTargetTotal(12);
        if (base1Y && base1Y > 0) {
            const r1Y = ((currentTotal - base1Y) / base1Y) * 100;
            renderReturnTxt('txtReturn1Y', r1Y);
        } else { document.getElementById('txtReturn1Y').innerText = '暂无基期'; document.getElementById('txtReturn1Y').className='return-val'; }
    }

    function renderReturnTxt(domId, rate) {
        const dom = document.getElementById(domId);
        const sign = rate >= 0 ? '+' : '';
        dom.innerText = sign + rate.toFixed(2) + '%';
        dom.className = 'return-val ' + (rate >= 0 ? 'text-up' : 'text-down');
    }

    /* 历史快照管理 */
    function saveHistoryRow() {
        const m = document.getElementById('histMonth').value;
        const v = parseFloat(document.getElementById('histValue').value) || 0;
        if(!m || v <= 0) { alert("请输入有效的月份和正确的历史资产金额！"); return; }

        const idx = appState.history.findIndex(h => h.month === m);
        if(idx >= 0) appState.history[idx].total = v;
        else appState.history.push({ month: m, total: v });

        appState.history.sort((a,b) => new Date(a.month) - new Date(b.month));
        localStorage.setItem('family_wealth_v3_state', JSON.stringify(appState));
        calculateAndRefresh();
        document.getElementById('histValue').value = '';
    }

    function clearAllHistory() {
        if(confirm("确定彻底清空所有历史月份的总资产备份存根吗？")) {
            appState.history = [];
            localStorage.setItem('family_wealth_v3_state', JSON.stringify(appState));
            calculateAndRefresh();
        }
    }

    /* Chart.js 图表渲染引擎 */
    function refreshPieChart(dist) {
        const ctx = document.getElementById('typeChart').getContext('2d');
        const labels = []; const data = []; const colors = [];
        
        for (let key in typeMeta) {
            if(dist[key] > 0) {
                labels.push(typeMeta[key].label);
                data.push(dist[key]);
                colors.push(typeMeta[key].color);
            }
        }

        if(typeChartInstance) {
            typeChartInstance.data.labels = labels;
            typeChartInstance.data.datasets[0].data = data;
            typeChartInstance.data.datasets[0].backgroundColor = colors;
            typeChartInstance.update();
        } else {
            typeChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: data, backgroundColor: colors, borderWidth: 1 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }
    }

    function refreshTrendChart() {
        const ctx = document.getElementById('trendChart').getContext('2d');
        const sortedHist = [...appState.history].sort((a,b) => new Date(a.month) - new Date(b.month));
        const labels = sortedHist.map(h => h.month);
        const data = sortedHist.map(h => h.total);

        if(trendChartInstance) {
            trendChartInstance.data.labels = labels;
            trendChartInstance.data.datasets[0].data = data;
            trendChartInstance.update();
        } else {
            trendChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '资产规模走势', data: data, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.05)',
                        borderWidth: 2, fill: true, tension: 0.2, pointRadius: 3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { ticks: { callback: v => v >= 10000 ? (v/10000)+'万' : v } } }
                }
            });
        }
    }
</script>
</body>
</html>
